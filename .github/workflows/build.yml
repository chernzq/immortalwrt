    - name: Configure
      run: |
        cat > .config << 'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq60xx=y
        CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y
        
        # 强制 UBI 格式（关键）
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_TARGET_ROOTFS_UBIFS=y
        CONFIG_TARGET_ROOTFS_UBI=y
        CONFIG_TARGET_ROOTFS_UBI_SQUASHFS=y
        
        # 禁用 FIT/DTB 格式
        # CONFIG_TARGET_ROOTFS_INITRAMFS is not set
        
        # 生成 factory.ubi
        CONFIG_TARGET_IMAGES_PAD=y
        CONFIG_TARGET_IMAGES_GZIP=y
        
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_smartmontools=y
        CONFIG_PACKAGE_luci=y
        EOF
        
        # 强制启用 UBI 镜像
        echo 'CONFIG_TARGET_ROOTFS_UBI=y' >> .config
        echo 'CONFIG_TARGET_UBIFS_JOURNAL_SIZE=""' >> .config
        
        make defconfig
        
        # 验证
        echo "=== 验证 UBI 配置 ==="
        grep "CONFIG_TARGET_ROOTFS_UBI" .config || echo "警告：UBI 未启用"
        grep "CONFIG_TARGET_ROOTFS_SQUASHFS" .config || echo "警告：SQUASHFS 未启用"
