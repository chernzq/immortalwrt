name: Build JDCloud RE-CS-02

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses5-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget subversion \
          patch vim time
        
    - name: Update Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Configure
      run: |
        # 基础配置
        cat > .config << 'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq60xx=y
        CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y
        CONFIG_TARGET_KERNEL_PARTSIZE=64
        CONFIG_TARGET_ROOTFS_PARTSIZE=1024
        
        # 文件系统
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_TARGET_ROOTFS_UBIFS=y
        CONFIG_TARGET_ROOTFS_UBI=y
        
        # 基础包
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_smartmontools=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-app-firewall=y
        EOF
        
        make defconfig
        
        # 验证配置
        grep "CONFIG_TARGET_ROOTFS_UBI" .config || echo "UBI not enabled"
        
    - name: Download
      run: make download -j$(nproc)
      
    - name: Compile
      run: make -j$(nproc) V=s || make -j1 V=s
      
    - name: Check Output
      run: |
        ls -la bin/targets/qualcommax/ipq60xx/
        file bin/targets/qualcommax/ipq60xx/* || true
      
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: jdcloud-re-cs-02-firmware
        path: |
          bin/targets/qualcommax/ipq60xx/*
        if-no-files-found: warn
