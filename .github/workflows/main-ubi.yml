name: Build JDCloud RE-CS-02

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses5-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget subversion \
          patch vim time mtd-utils
        
    - name: Update Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Diagnose Device Support
      run: |
        echo "=== 查找设备定义 ==="
        find . -path "./feeds" -prune -o -name "*jdcloud*" -print 2>/dev/null | head -20
        
        echo ""
        echo "=== 检查 image 目录 ==="
        ls -la target/linux/qualcommax/ipq60xx/image/ 2>/dev/null || \
        ls -la target/linux/qualcommax/image/ 2>/dev/null || \
        echo "未找到 image 目录"
        
        echo ""
        echo "=== 检查 generic.mk ==="
        cat target/linux/qualcommax/ipq60xx/image/generic.mk 2>/dev/null | grep -A 10 "jdcloud_re-cs-02" || \
        echo "未找到 generic.mk 或设备定义"
        
    - name: Configure
      run: |
        cat > .config << 'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq60xx=y
        CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y
        CONFIG_TARGET_KERNEL_PARTSIZE=64
        CONFIG_TARGET_ROOTFS_PARTSIZE=1024
        CONFIG_PACKAGE_luci=y
        EOF
        
        make defconfig
        
        echo "=== 当前配置 ==="
        grep "CONFIG_TARGET_ROOTFS" .config
        grep "CONFIG_TARGET_IMAGES" .config | head -5
        
    - name: Compile
      run: |
        make download -j$(nproc)
        make -j$(nproc) V=s || make -j1 V=s
      
    - name: Check Output
      run: |
        echo "=== 编译产物 ==="
        ls -lh bin/targets/qualcommax/ipq60xx/ 2>/dev/null || echo "目录不存在"
        
        for f in bin/targets/qualcommax/ipq60xx/*; do
          [ -f "$f" ] && echo "$(basename $f): $(file -b "$f" | cut -d, -f1)"
        done
      
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: jdcloud-re-cs-02-firmware
        path: bin/targets/qualcommax/ipq60xx/*
        if-no-files-found: warn
