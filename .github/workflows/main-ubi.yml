name: Build JDCloud RE-CS-02 ubi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses5-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget subversion \
          patch vim time mtd-utils ubi-utils
        
    - name: Update Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Configure
      run: |
        # 基础配置
        cat > .config << 'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq60xx=y
        CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y
        
        # 分区大小
        CONFIG_TARGET_KERNEL_PARTSIZE=64
        CONFIG_TARGET_ROOTFS_PARTSIZE=1024
        
        # 强制 UBI 格式（关键）
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_TARGET_ROOTFS_UBIFS=y
        CONFIG_TARGET_ROOTFS_UBI=y
        CONFIG_TARGET_ROOTFS_UBI_SQUASHFS=y
        
        # 启用 factory 镜像生成
        CONFIG_TARGET_IMAGES_PAD=y
        CONFIG_TARGET_IMAGES_GZIP=y
        
        # 禁用其他格式避免冲突
        # CONFIG_TARGET_ROOTFS_INITRAMFS is not set
        # CONFIG_TARGET_ROOTFS_EXT4FS is not set
        
        # 基础包
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_smartmontools=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-app-firewall=y
        EOF
        
        make defconfig
        
        # 强制确保 UBI 配置生效
        sed -i 's/# CONFIG_TARGET_ROOTFS_UBI is not set/CONFIG_TARGET_ROOTFS_UBI=y/g' .config
        sed -i 's/# CONFIG_TARGET_ROOTFS_UBI_SQUASHFS is not set/CONFIG_TARGET_ROOTFS_UBI_SQUASHFS=y/g' .config
        sed -i 's/# CONFIG_TARGET_IMAGES_PAD is not set/CONFIG_TARGET_IMAGES_PAD=y/g' .config
        
        # 重新加载配置
        make defconfig
        
        # 验证关键配置
        echo "=== 验证 UBI 配置 ==="
        grep "CONFIG_TARGET_ROOTFS_UBI" .config || (echo "UBI 未启用" && exit 1)
        grep "CONFIG_TARGET_ROOTFS_UBI_SQUASHFS" .config || (echo "UBI_SQUASHFS 未启用" && exit 1)
        grep "CONFIG_TARGET_IMAGES_PAD" .config || (echo "IMAGES_PAD 未启用" && exit 1)
        grep "CONFIG_TARGET_DEVICE_jdcloud_re-cs-02" .config || (echo "设备未选择" && exit 1)
        
        echo "=== 最终配置摘要 ==="
        grep -E "(UBI|IMAGES_PAD|ROOTFS_PARTSIZE)" .config | head -10
        
    - name: Download
      run: |
        make download -j$(nproc)
        find dl/ -size -1024c -exec rm -f {} \;
      
    - name: Compile
      run: |
        make -j$(nproc) V=s || make -j1 V=s
      
    - name: Check Output
      run: |
        echo "=== 编译产物列表 ==="
        ls -lh bin/targets/qualcommax/ipq60xx/ 2>/dev/null || echo "目录不存在"
        
        echo ""
        echo "=== 查找 factory/ubi 文件 ==="
        find bin/targets/qualcommax/ipq60xx/ -name "*factory*" -o -name "*ubi*" 2>/dev/null | while read f; do
          echo "--- $f ---"
          file "$f"
          ls -lh "$f"
        done
        
        echo ""
        echo "=== 所有文件类型 ==="
        for f in bin/targets/qualcommax/ipq60xx/*; do
          [ -f "$f" ] && echo "$(basename $f): $(file -b "$f" | cut -d, -f1)"
        done
      
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: jdcloud-re-cs-02-ubi-firmware
        path: |
          bin/targets/qualcommax/ipq60xx/*factory*
          bin/targets/qualcommax/ipq60xx/*ubi*
          bin/targets/qualcommax/ipq60xx/*sysupgrade*
        if-no-files-found: warn
        retention-days: 7
