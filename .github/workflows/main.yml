name: Build JDCloud RE-CS-02

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses5-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget subversion \
          patch vim time
        
    - name: Update Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Configure
      run: |
        cat > .config << 'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq60xx=y
        CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y
        CONFIG_TARGET_KERNEL_PARTSIZE=64
        CONFIG_TARGET_ROOTFS_PARTSIZE=512
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_smartmontools=y
        CONFIG_PACKAGE_luci=y
        EOF
        make defconfig
        
    - name: Download
      run: make download -j$(nproc)
      
    - name: Compile
      run: make -j$(nproc) V=s || make -j1 V=s
      
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: jdcloud-re-cs-02-firmware
        path: |
          bin/targets/qualcommax/ipq60xx/*factory.ubi
          bin/targets/qualcommax/ipq60xx/*sysupgrade.bin
        if-no-files-found: error
